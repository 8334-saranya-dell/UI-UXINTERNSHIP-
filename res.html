<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Menu</title>
  <style>
    body { font-family: Arial; background:#fafafa; }
    .menu { max-width:600px; margin:auto; }
    .item {
      display:flex;
      justify-content:space-between;
      padding:10px;
      border-bottom:1px solid #ddd;
    }
  </style>
</head>
<body>
  <div class="menu">
    <h2>🍽 Menu</h2>

    <div class="item">
      <span>Pizza</span>
      <span>₹250</span>
    </div>

    <div class="item">
      <span>Burger</span>
      <span>₹150</span>
    </div>

    <div class="item">
      <span>Pasta</span>
      <span>₹200</span>
    </div>

  </div>
</body>
</html>
